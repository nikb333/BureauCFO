name = "bureau-cfo-worker"
main = "src/worker.js"
compatibility_date = "2024-12-01"

# Import HTML as text for frontend serving
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = false

[vars]
HUBSPOT_ACCOUNT_ID = "44093193"
BUREAU_OPS_WORKER_URL = "https://bureau.withbureau.com"

[[d1_databases]]
binding = "DB"
database_name = "bureau-cfo"
database_id = "e9f1733a-d06b-45b5-806b-4f0cbb0c9f93"

[[kv_namespaces]]
binding = "CONFIG"
id = "10a8094fe3f542ba8e4f08de02cfd241"

# Scheduled accounting sync daily at 6am UTC
[triggers]
crons = ["0 6 * * *"]
