.entity-card{padding:16px;cursor:pointer;transition:box-shadow 0.15s;border-top:4px solid var(--c)}
.entity-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.loading{display:flex;align-items:center;justify-content:center;height:300px;color:#847D70;font-size:14px}
