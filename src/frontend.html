<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bureau — CFO Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',Helvetica,Arial,sans-serif;background:#FAFAF8;color:#213640;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#C4C3C1;border-radius:3px}
.pill{padding:5px 12px;border-radius:16px;border:1.5px solid #E0DFDB;cursor:pointer;font-family:inherit;font-size:11px;font-weight:500;background:#fff;color:#847D70;transition:all 0.15s}
.pill:hover{border-color:#847D70}.pill.active{border-color:var(--c,#213640);background:color-mix(in srgb,var(--c,#213640) 8%,white);color:var(--c,#213640);font-weight:600}
.card{background:#fff;border:1px solid #E8E7E3;border-radius:8px;overflow:hidden}
.card-hdr{padding:10px 16px;border-bottom:1px solid #E8E7E3;font-weight:600;font-size:12px;display:flex;justify-content:space-between;align-items:center}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:6px 10px;font-size:9px;color:#847D70;font-weight:600;letter-spacing:0.4px;text-transform:uppercase;border-bottom:1px solid #E8E7E3;position:sticky;top:0;background:#fff;z-index:1}
td{padding:5px 10px;border-bottom:1px solid #F0EFEB}tr:hover{background:#FAFAF8}
.badge{display:inline-block;padding:1px 7px;border-radius:3px;font-size:9px;font-weight:600}
.badge.overdue,.badge.true{background:#FDE8E8;color:#C0392B}.badge.current{background:#FEF3D6;color:#B8860B}
.badge.paid,.badge.false{background:#E2F5EC;color:#2D7F5E}
input[type=number],input[type=text],select{padding:4px 8px;border:1px solid #E0DFDB;border-radius:4px;font-size:11px;font-family:inherit;background:#FAFAF8;color:#213640;width:100%}
input[type=number]:focus,input[type=text]:focus,select:focus{outline:none;border-color:#3171F1;background:#fff}
.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;transition:all 0.15s}
.btn-primary{background:#213640;color:#fff}.btn-primary:hover{background:#2d4a56}
.btn-sm{padding:4px 10px;font-size:10px;border-radius:4px}
.btn-outline{background:transparent;border:1.5px solid #E0DFDB;color:#847D70}.btn-outline:hover{border-color:#847D70}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.loading{display:flex;align-items:center;justify-content:center;height:300px;color:#847D70;font-size:13px}
.tab-content{padding:20px 24px;max-width:1400px;margin:0 auto}
.kpi{padding:14px 16px;border-left:4px solid var(--c,#213640)}
.kpi-label{font-size:10px;color:#847D70;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.3px}
.kpi-val{font-size:22px;font-weight:700;letter-spacing:-0.5px}.kpi-sub{font-size:10px;color:#C4C3C1;margin-top:2px}
.entity-card{padding:14px;cursor:pointer;transition:all 0.15s;border-top:3px solid var(--c)}
.entity-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.05);transform:translateY(-1px)}
.section{margin-bottom:16px}
.input-grid{display:grid;grid-template-columns:80px repeat(11,1fr);gap:1px;background:#E8E7E3;border:1px solid #E8E7E3;border-radius:6px;overflow:hidden}
.input-grid>div{background:#fff;padding:4px 6px;font-size:10px;display:flex;align-items:center}
.input-grid>div.hdr{background:#F5F4F0;font-weight:600;color:#847D70;font-size:9px}
.input-grid input{border:none;background:transparent;text-align:center;padding:2px;font-size:10px;width:100%}
.input-grid input:focus{background:#EDF2FE;border-radius:2px}
.scenario-line{display:flex;align-items:center;gap:6px;padding:4px 0}
.scenario-dot{width:10px;height:10px;border-radius:50%}
</style>
</head>
<body>
<div id="root"><div class="loading">Loading Bureau CFO Dashboard...</div></div>
<script type="text/javascript">
const h=React.createElement,{useState:us,useEffect:ue,useMemo:um,useCallback:uc}=React;
const C={steel:"#213640",mid:"#847D70",warm:"#C4C3C1",blue:"#3171F1",orange:"#FF603B",offWhite:"#F7F4E7",
  ok:"#2D7F5E",bad:"#C0392B",warn:"#B8860B",yellow:"#FFFD6D",
  ent:{US:"#3171F1",CA:"#B8860B",UK:"#7B6BB5",AU:"#2D7F5E"},
  entBg:{US:"#EDF2FE",CA:"#FEF3D6",UK:"#F0EDF8",AU:"#E2F5EC"}};
const fmt=n=>{if(n==null||isNaN(n))return"\u2014";const a=Math.abs(n);if(a>=1e6)return(n<0?"-":"")+"$"+(a/1e6).toFixed(2)+"M";if(a>=1e3)return(n<0?"-":"")+"$"+(a/1e3).toFixed(0)+"K";return(n<0?"-$":"$")+a.toFixed(0)};
const fmtF=n=>{if(n==null||isNaN(n))return"\u2014";return(n<0?"-$":"$")+Math.abs(n).toLocaleString("en-US",{maximumFractionDigits:0})};
const pct=n=>n!=null?(n*100).toFixed(0)+"%":"\u2014";
const dateFmt=d=>d?new Date(d+"T00:00:00").toLocaleDateString("en-GB",{day:"2-digit",month:"short"}):"—";

// SVG Chart with multiple scenario lines
function Chart({data,scenarioData,height:H}){
  H=H||220;const W=900;if(!data||!data.length)return null;
  const p={t:20,r:20,b:30,l:60},w=W-p.l-p.r,hh=H-p.t-p.b;
  // Collect all values from all scenarios
  let allV=data.map(d=>d.withStock).concat(data.map(d=>d.exStock));
  if(scenarioData)Object.values(scenarioData).forEach(sd=>{if(sd.consolidated)sd.consolidated.forEach(d=>{allV.push(d.withStock);allV.push(d.exStock)})});
  const mn=Math.min(...allV)*1.1,mx=Math.max(...allV)*1.05,rng=mx-mn||1;
  const xp=i=>p.l+(i/(data.length-1))*w;
  const yp=v=>p.t+hh-((v-mn)/rng)*hh;
  const tks=[mn,mn+rng*.25,mn+rng*.5,mn+rng*.75,mx];
  const els=[];
  // Grid
  tks.forEach((t,i)=>{els.push(h("line",{key:"g"+i,x1:p.l,x2:W-p.r,y1:yp(t),y2:yp(t),stroke:"#EDECE8",strokeWidth:1}));els.push(h("text",{key:"gt"+i,x:p.l-8,y:yp(t)+4,textAnchor:"end",fill:"#847D70",fontSize:9,fontFamily:"DM Sans"},fmt(t)))});
  // Zero line
  if(mn<0&&mx>0)els.push(h("line",{key:"z",x1:p.l,x2:W-p.r,y1:yp(0),y2:yp(0),stroke:C.bad,strokeWidth:1,strokeDasharray:"4 4",opacity:0.4}));
  // X labels
  data.forEach((d,i)=>els.push(h("text",{key:"x"+i,x:xp(i),y:H-6,textAnchor:"middle",fill:"#847D70",fontSize:9,fontFamily:"DM Sans"},d.week)));
  // Scenario lines
  if(scenarioData){
    Object.values(scenarioData).forEach((sd,si)=>{
      if(!sd.consolidated)return;
      const pts=sd.consolidated.map((d,i)=>xp(i)+","+yp(d.withStock)).join(" ");
      els.push(h("polyline",{key:"s"+si,points:pts,fill:"none",stroke:sd.color||C.blue,strokeWidth:1.5,strokeDasharray:si>0?"5 3":"",opacity:0.7}));
    });
  }
  // Primary lines
  const ptsW=data.map((d,i)=>xp(i)+","+yp(d.withStock)).join(" ");
  const ptsE=data.map((d,i)=>xp(i)+","+yp(d.exStock)).join(" ");
  els.push(h("polyline",{key:"w",points:ptsW,fill:"none",stroke:C.steel,strokeWidth:2.5}));
  els.push(h("polyline",{key:"e",points:ptsE,fill:"none",stroke:C.blue,strokeWidth:2,strokeDasharray:"6 3"}));
  data.forEach((d,i)=>{els.push(h("circle",{key:"cw"+i,cx:xp(i),cy:yp(d.withStock),r:3,fill:C.steel}));els.push(h("circle",{key:"ce"+i,cx:xp(i),cy:yp(d.exStock),r:2.5,fill:C.blue}))});
  return h("svg",{width:"100%",viewBox:"0 0 "+W+" "+H,style:{display:"block"}},els);
}

// ── Currency-aware number formatting ──
const CURR={US:{s:'$',c:'USD',fx:1},CA:{s:'C$',c:'CAD',fx:0.71},UK:{s:'£',c:'GBP',fx:1.33},AU:{s:'A$',c:'AUD',fx:0.68}};
const fmtC=(n,eId)=>{const c=CURR[eId]||CURR.US;const neg=(n||0)<0?'-':'';return neg+c.s+Math.abs(n||0).toLocaleString('en-US',{maximumFractionDigits:0})};
const fmtPct=(n)=>Math.round((n||0)*100)+'%';
const addDays=(dateStr,days)=>{if(!dateStr)return null;const d=new Date(dateStr+'T00:00:00');d.setDate(d.getDate()+days);return d.toISOString().slice(0,10)};

// Currency input: shows formatted, edits raw
function CInput({value,entity,onChange,style:s}){
  const [editing,setEditing]=us(false);const [raw,setRaw]=us(String(value||0));
  ue(()=>{if(!editing)setRaw(String(value||0))},[value,editing]);
  const c=CURR[entity]||CURR.US;
  return editing?
    h("input",{type:"number",value:raw,autoFocus:true,style:{...s,fontSize:12,fontWeight:600,padding:"5px 8px",border:"2px solid #3171F1",borderRadius:4,background:"#fff",width:"100%",fontFamily:"DM Sans"},
      onChange:e=>setRaw(e.target.value),onBlur:()=>{setEditing(false);onChange&&onChange(parseFloat(raw)||0)}}):
    h("div",{onClick:()=>setEditing(true),style:{...s,cursor:"pointer",fontSize:12,fontWeight:600,padding:"5px 8px",border:"1px solid #E0DFDB",borderRadius:4,background:"#FAFAF8",width:"100%"},title:"Click to edit"},
      h("span",{style:{color:"#847D70",fontSize:10}},c.s),h("span",null,(parseFloat(value)||0).toLocaleString('en-US',{maximumFractionDigits:0})));
}

// Percent input
function PctInput({value,onChange,style:s}){
  const [editing,setEditing]=us(false);const [raw,setRaw]=us(String(Math.round((value||0)*100)));
  ue(()=>{if(!editing)setRaw(String(Math.round((value||0)*100)))},[value,editing]);
  return editing?
    h("input",{type:"number",value:raw,autoFocus:true,step:1,style:{...s,fontSize:12,fontWeight:600,padding:"5px 8px",border:"2px solid #3171F1",borderRadius:4,background:"#fff",width:70,fontFamily:"DM Sans"},
      onChange:e=>setRaw(e.target.value),onBlur:()=>{setEditing(false);onChange&&onChange(parseFloat(raw)/100)}}):
    h("div",{onClick:()=>setEditing(true),style:{...s,cursor:"pointer",fontSize:12,fontWeight:600,padding:"5px 8px",border:"1px solid #E0DFDB",borderRadius:4,background:"#FAFAF8",width:70,textAlign:"center"},title:"Click to edit"},
      Math.round((value||0)*100)+"%");
}

// ── Payroll & Opex Table ──
function PayrollTable({config,settings,onSave,onSaveSettings}){
  const [data,setData]=us(config||[]);const [mktBudget,setMktBudget]=us(parseFloat(settings?.marketing_monthly_usd||225000));
  ue(()=>setData(config||[]),[config]);
  const upd=(eId,f,v)=>{const nd=data.map(r=>r.entity_id===eId?{...r,[f]:v}:r);setData(nd);onSave&&onSave(nd)};
  const mktCheck=data.reduce((s,r)=>s+(r.marketing_pct||0),0);
  return h("div",null,
    h("div",{className:"card section"},
      h("div",{className:"card-hdr"},h("span",null,"Payroll & Operating Costs"),h("span",{style:{fontSize:10,color:C.ok}},"\u2713 Auto-saves on edit")),
      h("table",null,
        h("thead",null,h("tr",null,h("th",{style:{width:150}},""),["US","CA","UK","AU"].map(e=>h("th",{key:e,style:{color:C.ent[e]}},e+" ("+(CURR[e]||{}).c+")")))),
        h("tbody",null,
          h("tr",null,h("td",{style:{fontWeight:500,color:C.mid,fontSize:11}},"Payroll Amount"),["US","CA","UK","AU"].map(e=>{const r=data.find(x=>x.entity_id===e)||{};return h("td",{key:e},h(CInput,{value:r.payroll_amount,entity:e,onChange:v=>upd(e,"payroll_amount",v)}))})),
          h("tr",null,h("td",{style:{fontWeight:500,color:C.mid,fontSize:11}},"Payroll Tax"),["US","CA","UK","AU"].map(e=>{const r=data.find(x=>x.entity_id===e)||{};return h("td",{key:e},h(CInput,{value:r.payroll_tax,entity:e,onChange:v=>upd(e,"payroll_tax",v)}))})),
          h("tr",null,h("td",{style:{fontWeight:500,color:C.mid,fontSize:11}},"Frequency"),["US","CA","UK","AU"].map(e=>{const r=data.find(x=>x.entity_id===e)||{};return h("td",{key:e},h("select",{value:r.payroll_frequency||"bimonthly",style:{fontSize:11,padding:4,border:"1px solid #E0DFDB",borderRadius:4,width:"100%"},onChange:ev=>upd(e,"payroll_frequency",ev.target.value)},["bimonthly","monthly","fortnightly"].map(o=>h("option",{key:o},o))))})),
          h("tr",null,h("td",{style:{fontWeight:500,color:C.mid,fontSize:11}},"Rent (Monthly)"),["US","CA","UK","AU"].map(e=>{const r=data.find(x=>x.entity_id===e)||{};return h("td",{key:e},h(CInput,{value:r.rent_monthly,entity:e,onChange:v=>upd(e,"rent_monthly",v)}))})),
          h("tr",null,h("td",{style:{fontWeight:500,color:C.mid,fontSize:11}},"Misc (Weekly)"),["US","CA","UK","AU"].map(e=>{const r=data.find(x=>x.entity_id===e)||{};return h("td",{key:e},h(CInput,{value:r.misc_weekly,entity:e,onChange:v=>upd(e,"misc_weekly",v)}))})),
          h("tr",null,h("td",{style:{fontWeight:500,color:C.mid,fontSize:11}},"Install Cost %"),["US","CA","UK","AU"].map(e=>{const r=data.find(x=>x.entity_id===e)||{};return h("td",{key:e},h(PctInput,{value:r.install_cost_pct,onChange:v=>upd(e,"install_cost_pct",v)}))})),
          h("tr",null,h("td",{style:{fontWeight:500,color:C.mid,fontSize:11}},"Stock Replacement %"),["US","CA","UK","AU"].map(e=>{const r=data.find(x=>x.entity_id===e)||{};return h("td",{key:e},h(PctInput,{value:r.stock_replacement_pct,onChange:v=>upd(e,"stock_replacement_pct",v)}))}))
        ))
    ),
    h("div",{className:"card section"},
      h("div",{className:"card-hdr"},h("span",null,"Marketing Budget"),h("span",{style:{fontSize:10,color:C.ok}},"\u2713 Auto-saves")),
      h("div",{style:{padding:"12px 16px",display:"flex",alignItems:"center",gap:12,borderBottom:"1px solid #E8E7E3",background:"#FAFAF8"}},
        h("span",{style:{fontSize:11,fontWeight:600,color:C.mid}},"Total Monthly Budget (USD)"),
        h(CInput,{value:mktBudget,entity:"US",onChange:v=>{setMktBudget(v);onSaveSettings&&onSaveSettings({marketing_monthly_usd:String(v)})}}),
        mktCheck!==1&&h("span",{style:{fontSize:10,color:C.bad,fontWeight:600}},"\u26a0 Allocation = "+fmtPct(mktCheck)+" (should be 100%)")),
      h("table",null,
        h("thead",null,h("tr",null,["Entity","Amex","Currency","Allocation %","Monthly USD","Weekly (Local)"].map(x=>h("th",{key:x},x)))),
        h("tbody",null,["US","CA","UK","AU"].map(e=>{const r=data.find(x=>x.entity_id===e)||{};const moUSD=mktBudget*(r.marketing_pct||0);const wkLocal=moUSD/4.33/(CURR[e]?.fx||1);
          return h("tr",{key:e},
            h("td",{style:{fontWeight:600,color:C.ent[e]}},e),
            h("td",{style:{fontSize:10,color:C.mid}},e+" Amex"),
            h("td",{style:{fontSize:10,color:C.mid}},(CURR[e]||{}).c),
            h("td",null,h(PctInput,{value:r.marketing_pct,onChange:v=>upd(e,"marketing_pct",v)})),
            h("td",{style:{fontWeight:600}},fmtF(Math.round(moUSD))),
            h("td",{style:{fontWeight:600,color:C.ent[e]}},fmtC(Math.round(wkLocal),e)+"/wk")
          )})))
    )
  );
}

// ── New Orders Revenue ──
function NewOrdersTable({orders,onSave}){
  const [data,setData]=us(orders||[]);
  ue(()=>setData(orders||[]),[orders]);
  const upd=(eId,f,v)=>{const nd=data.map(r=>r.entity_id===eId?{...r,[f]:v}:r);setData(nd);onSave&&onSave(nd)};
  const totalUSD=data.reduce((s,r)=>{const fx=CURR[r.entity_id]?.fx||1;return s+(r.monthly_revenue_local||0)*fx},0);
  return h("div",{className:"card section"},
    h("div",{className:"card-hdr"},h("span",null,"New Orders Revenue"),h("span",{style:{fontSize:10,color:C.ok}},"\u2713 Auto-saves")),
    h("table",null,
      h("thead",null,h("tr",null,["Entity","Monthly Revenue (Local)","Delay Weeks","Ramp Weeks","Install Cost %","Stock Replacement %"].map((l,i)=>h("th",{key:i},l)))),
      h("tbody",null,
        data.map(r=>h("tr",{key:r.entity_id},
          h("td",{style:{fontWeight:600,color:C.ent[r.entity_id]}},r.entity_id+" ("+(CURR[r.entity_id]||{}).c+")"),
          h("td",null,h(CInput,{value:r.monthly_revenue_local,entity:r.entity_id,onChange:v=>upd(r.entity_id,"monthly_revenue_local",v)})),
          h("td",null,h("input",{type:"number",value:r.delay_weeks||0,style:{width:60,textAlign:"center",fontSize:12,fontWeight:600,padding:"5px 8px",border:"1px solid #E0DFDB",borderRadius:4},onChange:e=>upd(r.entity_id,"delay_weeks",parseInt(e.target.value)||0)})),
          h("td",null,h("input",{type:"number",value:r.ramp_weeks||0,style:{width:60,textAlign:"center",fontSize:12,fontWeight:600,padding:"5px 8px",border:"1px solid #E0DFDB",borderRadius:4},onChange:e=>upd(r.entity_id,"ramp_weeks",parseInt(e.target.value)||0)})),
          h("td",null,h(PctInput,{value:r.cogs_rate,onChange:v=>upd(r.entity_id,"cogs_rate",v)})),
          h("td",null,h(PctInput,{value:r.replacement_rate,onChange:v=>upd(r.entity_id,"replacement_rate",v)}))
        )),
        h("tr",{style:{borderTop:"2px solid #213640",background:"#F5F4F0"}},
          h("td",{style:{fontWeight:700}},"Total (USD equiv)"),
          h("td",{style:{fontWeight:700,fontSize:13}},fmtF(Math.round(totalUSD))+"/mo"),
          h("td",{colSpan:4,style:{fontSize:10,color:C.mid}},"= "+fmtF(Math.round(totalUSD*12/52))+"/wk at full ramp")
        )
      ))
  );
}

// ── AR Collection with mode toggle ──
function ARCollectionPanel({arRates,arHubspotOverflow,arDeals,syftRecon,entities:ents,settings,onUpdateRate,onUpdateOverflow,onSaveSettings}){
  const mode=settings?.ar_collection_mode||'aggregate';
  const fxR={US:1,CA:0.71,UK:1.33,AU:0.68};
  const EIDs=["US","CA","UK","AU"];
  const startDate=settings?.week_start_date||'2026-03-07';
  const weekStarts=Array.from({length:11},(_,i)=>{const d=new Date(startDate);d.setDate(d.getDate()+i*7);return d});
  const weekLabel=(i)=>{const d=weekStarts[i];return d?d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}):''};
  const [openAccordion,setOpenAccordion]=us(null);

  // Payment schedule helper (mirrors worker.js logic)
  const PAY_DELAY=10;
  const paySchedule=(d)=>{
    const t=d.payment_terms||'',prom=d.promised_date,inst=d.install_date;
    if(t.includes('50/50')) return [{pct:50,date:prom?addDays(prom,PAY_DELAY):null,label:'50% confirmation'},{pct:50,date:inst?addDays(inst,PAY_DELAY):null,label:'50% install'}];
    if(t.includes('Due on Confirmation')) return [{pct:100,date:prom?addDays(prom,PAY_DELAY):null,label:'Due on confirmation'}];
    if(t.includes('Net 30 from install')) return [{pct:100,date:inst?addDays(inst,30):null,label:'Net 30 install'}];
    if(t.includes('Net 30')) return [{pct:100,date:prom?addDays(prom,30):null,label:'Net 30'}];
    if(t.includes('Net 60')) return [{pct:100,date:prom?addDays(prom,60):null,label:'Net 60'}];
    return [{pct:100,date:prom?addDays(prom,PAY_DELAY):null,label:t||'Standard'}];
  };
  // HubSpot waterfall: bucket deals by payment schedule into weeks
  const hubspotWaterfall=(eId)=>{
    const deals=(arDeals||[]).filter(d=>d.entity_id===eId&&d.outstanding>0);
    const syft=syftRecon?.[eId]||{};
    const totalAR=syft.ar_total||deals.reduce((s,d)=>s+(d.outstanding||0),0);
    const wks=Array(11).fill(0);const wkDeals=Array.from({length:11},()=>[]);
    let assigned=0;
    const overdue=[];const undated=[];
    const wk0Start=weekStarts[0];
    deals.forEach(d=>{
      const sched=paySchedule(d);
      sched.forEach(s=>{
        const payAmt=Math.round((d.outstanding||0)*s.pct/100);
        if(!s.date){undated.push({...d,outstanding:payAmt});return}
        const pd=new Date(s.date+'T00:00:00');
        if(pd<wk0Start){overdue.push({...d,outstanding:payAmt});return}
        let placed=false;
        for(let i=0;i<11;i++){const ws=weekStarts[i],we=new Date(ws.getTime()+6*864e5);
          if(pd>=ws&&pd<=we){wks[i]+=payAmt;wkDeals[i].push({...d,outstanding:payAmt,_schedLabel:s.label});assigned+=payAmt;placed=true;break}}
      });
    });
    const overdueTotal=overdue.reduce((s,d)=>s+(d.outstanding||0),0)+undated.reduce((s,d)=>s+(d.outstanding||0),0);
    return {wks,wkDeals,totalAR,assigned,overdue,undated,overdueTotal};
  };

  // Aggregate mode: total check
  const aggCheck=(eId)=>{

  const [tradeLoans,setTradeLoans]=us([]);
  const [waterfall,setWaterfall]=us(null);
  const [inputs,setInputs]=us(null);
  const [scenarios,setScenarios]=us([]);
  const [loading,setLoading]=us(true);
  const [error,setError]=us(null);
  const [saving,setSaving]=us(false);
  const [arSub,setArSub]=us("summary");
  const [syftAr,setSyftAr]=us([]);

  const load=()=>{
    Promise.all([
      fetch('/api/entities').then(r=>r.json()),
      fetch('/api/ar').then(r=>r.json()),
      fetch('/api/ap').then(r=>r.json()),
      fetch('/api/stock-pos').then(r=>r.json()),
      fetch('/api/trade-loans').then(r=>r.json()),
      fetch('/api/waterfall?scenarios=1,2').then(r=>r.json()),
      fetch('/api/inputs').then(r=>r.json()),
      fetch('/api/scenarios').then(r=>r.json()),
      fetch('/api/syft-ar').then(r=>r.json()).catch(()=>({items:[]})),
    ]).then(([ent,arD,apD,poD,lnD,wf,inp,sc,syftArD])=>{
      setEntities(ent.entities||[]);setAr(arD.deals||[]);setAp(apD.vendors||[]);
      setStockPOs(poD.orders||[]);setTradeLoans(lnD.loans||[]);
      setWaterfall(wf);setInputs(inp);setScenarios(sc.scenarios||[]);setSyftAr(syftArD.items||[]);setLoading(false);
    }).catch(e=>{setError(e.message);setLoading(false)});
  };
  ue(load,[]);

  const entMap=um(()=>{const m={};(entities||[]).forEach(e=>m[e.id]=e);return m},[entities]);
  const totalCash=um(()=>(entities||[]).reduce((s,e)=>{const c=(e.bank_accounts||[]).filter(b=>b.type!=='credit').reduce((s2,b)=>s2+b.balance,0);return s+c*(e.fx_rate||1)},0),[entities]);
  const totalAR=um(()=>ar.reduce((s,d)=>s+(d.outstanding||0)*((entMap[d.entity_id]||{}).fx_rate||1),0),[ar,entMap]);
  const arByE=um(()=>{const m={US:{c:0,t:0},CA:{c:0,t:0},UK:{c:0,t:0},AU:{c:0,t:0}};ar.forEach(d=>{if(m[d.entity_id]){m[d.entity_id].c++;m[d.entity_id].t+=(d.outstanding||0)}});return m},[ar]);
  const filtAR=um(()=>{let d=[...ar].filter(x=>x.outstanding>0);if(arRegion!=="ALL")d=d.filter(x=>x.entity_id===arRegion);d.sort((a,b)=>(b.outstanding||0)-(a.outstanding||0));return d},[ar,arRegion]);

  const saveInput=async(endpoint,body)=>{
    setSaving(true);
    try{await fetch('/api/inputs/'+endpoint,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      // Reload waterfall
      const wf=await fetch('/api/waterfall?scenarios=1,2').then(r=>r.json());
      setWaterfall(wf);
      const inp=await fetch('/api/inputs').then(r=>r.json());
      setInputs(inp);
    }catch(e){console.error(e)}
    setSaving(false);
  };

  if(loading)return h("div",{className:"loading"},"Loading Bureau CFO Dashboard...");
  if(error)return h("div",{className:"loading",style:{color:C.bad}},"Error: "+error);

  const TABS=[{id:"overview",l:"Overview"},{id:"ar",l:"AR Chasing"},{id:"entity",l:"Entity Cashflow"},{id:"stock",l:"Stock Payments"},{id:"inputs",l:"Inputs"},{id:"scenarios",l:"Scenarios"}];
  const lowestWk=waterfall?.consolidated?Math.min(...waterfall.consolidated.filter(w=>w.week!=='Today').map(w=>w.withStock)):0;

  return h("div",null,
    // Header
    h("div",{style:{background:C.steel,padding:"0 24px",display:"flex",justifyContent:"space-between",alignItems:"center",height:48}},
      h("div",{style:{display:"flex",alignItems:"center",gap:10}},
        h("img",{src:"https://withbureau.com/wp-content/uploads/2025/03/Bureau_Branding.svg",alt:"Bureau",style:{height:18,filter:"brightness(0) invert(1)"},onError:e=>e.target.style.display='none'}),
        h("div",{style:{width:1,height:20,background:"rgba(255,255,255,0.15)"}}),
        h("span",{style:{fontSize:11,color:"rgba(255,255,255,0.5)",fontWeight:500}},"CFO Dashboard")),
      h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
        saving&&h("span",{style:{fontSize:10,color:C.yellow}},"Saving..."),
        h("span",{style:{fontSize:9,color:"rgba(255,255,255,0.3)"}},ar.filter(d=>d.outstanding>0).length+" AR \u00b7 "+ap.length+" AP"))
    ),
    // Nav
    h("div",{style:{padding:"0 24px",borderBottom:"1px solid #E8E7E3",display:"flex",background:"#fff"}},
      TABS.map(t=>h("button",{key:t.id,onClick:()=>setTab(t.id),style:{padding:"10px 16px",border:"none",borderBottom:tab===t.id?"3px solid "+C.yellow:"3px solid transparent",cursor:"pointer",fontSize:12,fontWeight:tab===t.id?600:400,fontFamily:"inherit",background:"transparent",color:tab===t.id?C.steel:C.mid}},t.l))
    ),

    h("div",{className:"tab-content"},

      // ═══ OVERVIEW ═══
      tab==="overview"&&h("div",null,
        h("div",{className:"grid-4",style:{marginBottom:16}},
          [{l:"Cash Position",v:fmtF(Math.round(totalCash)),s:"Consolidated USD",c:C.steel},
           {l:"Total AR Outstanding",v:fmt(totalAR),s:ar.filter(d=>d.outstanding>0).length+" unpaid deals",c:C.ok},
           {l:"Total AP",v:fmt(ap.reduce((s,v)=>s+v.amount,0)),s:ap.length+" vendors",c:C.bad},
           {l:"Lowest Week",v:fmt(lowestWk),s:"With stock payments",c:lowestWk<0?C.bad:C.warn}
          ].map((k,i)=>h("div",{key:i,className:"card kpi",style:{"--c":k.c}},
            h("div",{className:"kpi-label"},k.l),h("div",{className:"kpi-val"},k.v),h("div",{className:"kpi-sub"},k.s)))
        ),
        // Chart
        waterfall?.consolidated&&h("div",{className:"card",style:{padding:16,marginBottom:16}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
            h("div",null,h("div",{style:{fontSize:14,fontWeight:600}},"13-Week Cash Position"),
              h("div",{style:{fontSize:10,color:C.mid}},
                h("span",{style:{color:C.steel}},"\u2501\u2501")," with stock \u00b7 ",
                h("span",{style:{color:C.blue}},"\u254C\u254C")," excl. stock")),
            h("div",{style:{display:"flex",gap:8}},
              scenarios.filter(s=>s.is_active).map(s=>h("div",{key:s.id,className:"scenario-line"},
                h("div",{className:"scenario-dot",style:{background:s.color}}),
                h("span",{style:{fontSize:10,color:C.mid}},s.name)))
            )
          ),
          h(Chart,{data:waterfall.consolidated,scenarioData:waterfall.scenarios,height:240})
        ),
        // Entity cards
        h("div",{className:"grid-4"},
          ["US","CA","UK","AU"].map(k=>{const e=entMap[k];if(!e)return null;
            const cash=(e.bank_accounts||[]).filter(b=>b.type!=='credit').reduce((s,b)=>s+b.balance,0);
            return h("div",{key:k,className:"card entity-card",style:{"--c":C.ent[k],background:C.entBg[k]},onClick:()=>{setETab(k);setTab("entity")}},
              h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:8}},
                h("span",{style:{fontSize:13,fontWeight:700,color:C.ent[k]}},k),
                h("span",{style:{fontSize:9,color:C.mid}},e.currency)),
              h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,fontSize:10}},
                h("div",null,h("div",{style:{fontSize:8,color:C.mid}},"Cash"),h("div",{style:{fontWeight:600}},fmtF(cash))),
                h("div",null,h("div",{style:{fontSize:8,color:C.mid}},"AR"),h("div",{style:{fontWeight:600,color:C.ok}},fmt((arByE[k]||{}).t))),
                h("div",null,h("div",{style:{fontSize:8,color:C.mid}},"Deals"),h("div",{style:{fontWeight:600}},(arByE[k]||{}).c)),
                h("div",null,h("div",{style:{fontSize:8,color:C.mid}},"Payroll"),h("div",{style:{fontWeight:600}},e.payroll?fmtF(e.payroll.amount):"\u2014"))
              )
            )})
        )
      ),

      // ═══ AR CHASING ═══
      tab==="ar"&&(()=>{
        const unpaid=ar.filter(d=>d.outstanding>0);
        const definite=unpaid.filter(d=>d.ar_bucket==='definite'||(!d.ar_bucket&&d.payment_terms&&d.payment_terms!=='Other'));
        const proposed=unpaid.filter(d=>d.ar_bucket==='proposed'||(d.payment_terms==='Other'||!d.payment_terms));
        const missingInv=unpaid.filter(d=>d.ar_bucket==='missing_invoice'||(!d.invoice_status&&d.outstanding>0));
        const justClosed=unpaid.filter(d=>d.just_closed);
        const isDirect=d=>['Inbound','Outbound','Return Customer','RFP/Tenders'].includes(d.sales_channel);
        const isChannel=d=>['Dealers','Architect/Designer','Builder','Design & Build'].includes(d.sales_channel);
        const fxR={US:1,CA:0.71,UK:1.33,AU:0.68,EUR:1.08};
        const toUSD=(d)=>Math.round((d.outstanding||0)*(fxR[d.entity_id]||1));
        const regionOrder=['AU','UK','US','CA'];

        const DealRow=(d,showTermsNote)=>h("tr",{key:d.id},
          h("td",{style:{fontWeight:500,maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},
            d.hubspot_link?h("a",{href:d.hubspot_link,target:"_blank",style:{color:C.steel,textDecoration:"none"}},d.deal_name):d.deal_name),
          h("td",{style:{color:C.mid,fontSize:10}},d.owner),
          h("td",null,h("span",{style:{color:C.ent[d.entity_id],fontWeight:600}},d.entity_id)),
          h("td",{style:{color:C.mid}},d.currency),
          h("td",{style:{fontSize:10}},fmtF(d.amount)),
          h("td",{style:{fontSize:10,color:C.ok}},d.paid?fmtF(d.paid):"—"),
          h("td",{style:{fontWeight:600}},fmtF(d.outstanding)),
          h("td",{style:{fontWeight:600,color:C.mid,fontSize:10}},fmtF(toUSD(d))),
          h("td",{style:{color:C.mid,fontSize:9,maxWidth:130}},
            d.payment_terms==='Other'&&d.payment_terms_other?h("span",{title:d.payment_terms_other},"\u2139\ufe0f "+d.payment_terms_other.slice(0,30)):d.payment_terms||"—"),
          h("td",{style:{fontSize:10}},dateFmt(d.close_date)),
          h("td",{style:{fontSize:10,color:C.mid}},d.age_days||"—"),
          h("td",{style:{fontSize:10}},dateFmt(d.promised_date)),
          h("td",null,h("span",{className:"badge "+(d.overdue?"true":"false")},d.overdue?"Yes":"No")),
          h("td",null,d.hubspot_link?h("a",{href:d.hubspot_link,target:"_blank",style:{fontSize:9,color:C.blue}},"\u2197"):null)
        );

        const DealTable=(deals,showTermsNote)=>{
          const direct=deals.filter(isDirect).sort((a,b)=>b.outstanding-a.outstanding);
          const channel=deals.filter(isChannel).sort((a,b)=>b.outstanding-a.outstanding);
          const other=deals.filter(d=>!isDirect(d)&&!isChannel(d)).sort((a,b)=>b.outstanding-a.outstanding);
          const Section=(title,items)=>{
            const byRegion={};regionOrder.forEach(r=>{const rd=items.filter(d=>d.entity_id===r);if(rd.length)byRegion[r]=rd});
            return h("div",null,
              h("tr",null,h("td",{colSpan:14,style:{fontWeight:700,fontSize:12,color:C.steel,paddingTop:12,background:"#F5F4F0"}},title)),
              Object.entries(byRegion).map(([r,rd])=>h(React.Fragment,{key:r},
                h("tr",null,h("td",{colSpan:14,style:{fontSize:10,fontWeight:600,color:C.ent[r],paddingTop:6}},"── "+{AU:"AUS",UK:"UK",US:"USA",CA:"CAD"}[r]+" ("+rd.length+" deals) ──")),
                rd.map(d=>DealRow(d,showTermsNote))
              ))
            )};
          return h("table",null,
            h("thead",null,h("tr",null,["Deal","Owner","Entity","Cur","Amount","Paid","Outstanding","USD","Terms","Closed","Age","Promised","Overdue",""].map(x=>h("th",{key:x},x)))),
            h("tbody",null,
              direct.length>0&&Section("DIRECT",direct),
              channel.length>0&&Section("CHANNEL",channel),
              other.length>0&&Section("OTHER",other)
            )
          );
        };

        const ARSUBS=[{id:"summary",l:"Summary"},{id:"definite",l:"Definite ("+definite.length+")"},{id:"proposed",l:"Proposed ("+proposed.length+")"},{id:"missing",l:"Missing Inv ("+missingInv.length+")"},{id:"justclosed",l:"Just Closed ("+justClosed.length+")"},{id:"recon",l:"Reconciliation"}];

        return h("div",null,
          h("div",{style:{display:"flex",gap:6,marginBottom:14}},
            ARSUBS.map(s=>h("button",{key:s.id,className:"pill"+(arSub===s.id?" active":""),style:{"--c":C.steel},onClick:()=>setArSub(s.id)},s.l))),

          arSub==="summary"&&h("div",null,
            h("div",{className:"grid-4",style:{marginBottom:16}},
              [{l:"Total AR Outstanding",v:fmtF(Math.round(unpaid.reduce((s,d)=>s+toUSD(d),0))),s:unpaid.length+" deals",c:C.steel},
               {l:"Definite Chases",v:fmtF(Math.round(definite.reduce((s,d)=>s+toUSD(d),0))),s:definite.length+" deals",c:C.ok},
               {l:"Proposed Chases",v:fmtF(Math.round(proposed.reduce((s,d)=>s+toUSD(d),0))),s:proposed.length+" deals",c:C.warn},
               {l:"Missing Invoices",v:missingInv.length+" deals",s:"No invoice raised",c:C.bad}
              ].map((k,i)=>h("div",{key:i,className:"card kpi",style:{"--c":k.c}},h("div",{className:"kpi-label"},k.l),h("div",{className:"kpi-val"},k.v),h("div",{className:"kpi-sub"},k.s)))),
            h("div",{className:"card",style:{marginBottom:16}},
              h("div",{className:"card-hdr"},"Outstanding by Region — Definite Chases (USD)"),
              h("table",null,h("thead",null,h("tr",null,["Region","Direct (USD)","Channel (USD)","Total (USD)"].map(x=>h("th",{key:x},x)))),
                h("tbody",null,regionOrder.map(r=>{const rd=definite.filter(d=>d.entity_id===r);const dir=rd.filter(isDirect);const ch=rd.filter(isChannel);
                  return h("tr",{key:r},h("td",{style:{fontWeight:600,color:C.ent[r]}},{AU:"AUS",UK:"UK",US:"USA",CA:"CAD"}[r]),
                    h("td",null,fmtF(dir.reduce((s,d)=>s+toUSD(d),0))),h("td",null,ch.length?fmtF(ch.reduce((s,d)=>s+toUSD(d),0)):"—"),h("td",{style:{fontWeight:700}},fmtF(rd.reduce((s,d)=>s+toUSD(d),0))))}
                )))
            ),
            h("div",{className:"card"},
              h("div",{className:"card-hdr"},"Outstanding Leaderboard (USD)"),
              h("table",null,h("thead",null,h("tr",null,["#","Owner","Outstanding (USD)","Deals"].map(x=>h("th",{key:x},x)))),
                h("tbody",null,(()=>{const byOwner={};unpaid.forEach(d=>{if(!byOwner[d.owner])byOwner[d.owner]={usd:0,cnt:0};byOwner[d.owner].usd+=toUSD(d);byOwner[d.owner].cnt++});
                  return Object.entries(byOwner).sort((a,b)=>b[1].usd-a[1].usd).map(([name,v],i)=>h("tr",{key:name},h("td",null,i+1),h("td",{style:{fontWeight:500}},name),h("td",{style:{fontWeight:600}},fmtF(v.usd)),h("td",null,v.cnt)))})()))
            )
          ),

          arSub==="definite"&&h("div",{className:"card"},
            h("div",{className:"card-hdr",style:{color:C.ok,background:"#E2F5EC"}},h("span",null,"Definite Chases — Payment Terms Confirmed"),h("span",null,fmtF(Math.round(definite.reduce((s,d)=>s+toUSD(d),0)))+" USD")),
            DealTable(definite)),

          arSub==="proposed"&&h("div",{className:"card"},
            h("div",{className:"card-hdr",style:{color:C.warn,background:"#FEF3D6"}},h("span",null,"Proposed Chases — Terms TBC"),h("span",null,proposed.length+" deals")),
            DealTable(proposed,true)),

          arSub==="missing"&&h("div",{className:"card"},
            h("div",{className:"card-hdr",style:{color:C.bad,background:"#FDE8E8"}},h("span",null,"Missing Invoices — No Invoice Raised"),h("span",null,missingInv.length+" deals")),
            DealTable(missingInv)),

          arSub==="justclosed"&&h("div",{className:"card"},
            h("div",{className:"card-hdr",style:{color:C.blue,background:"#EDF2FE"}},h("span",null,"Just Closed — Last 3 Days"),h("span",null,justClosed.length+" deals")),
            DealTable(justClosed)),

          // ═══ RECONCILIATION SUB-TAB ═══
          arSub==="recon"&&(()=>{
            const EIDs=["US","CA","UK","AU"];
            const syftRecon=waterfall?Object.fromEntries(Object.entries(waterfall.entities||{}).map(([k,v])=>([k,{ar_total:v.arTotal}]))):{};

            // Auto-match: try invoice_number first, then fuzzy name+amount
            const normalize=s=>(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
            const matchScore=(syftItem,deal)=>{
              // Exact invoice number match
              if(syftItem.invoice_number&&deal.invoice_number&&normalize(syftItem.invoice_number)===normalize(deal.invoice_number)) return 100;
              // Name similarity + amount within 5%
              const sName=normalize(syftItem.customer_name), dName=normalize(deal.deal_name);
              let nameMatch=0;
              if(sName&&dName){if(sName.includes(dName)||dName.includes(sName)) nameMatch=60;
                else{const words=sName.split(/\s+/);const dWords=dName.split(/\s+/);const common=words.filter(w=>w.length>2&&dWords.some(dw=>dw.includes(w)));nameMatch=common.length?Math.min(50,common.length*15):0}}
              const amtDiff=Math.abs((syftItem.outstanding||0)-(deal.outstanding||0));
              const amtMatch=amtDiff<Math.max(syftItem.outstanding||1,1)*0.05?30:amtDiff<Math.max(syftItem.outstanding||1,1)*0.15?15:0;
              return nameMatch+amtMatch;
            };

            // Group Syft items by entity
            const syftByE={};EIDs.forEach(e=>{syftByE[e]=syftAr.filter(s=>s.entity_id===e)});
            const dealsByE={};EIDs.forEach(e=>{dealsByE[e]=unpaid.filter(d=>d.entity_id===e)});

            // Auto-match each Syft item to best deal
            const autoMatches={};
            EIDs.forEach(e=>{
              const available=new Set(dealsByE[e].map(d=>d.id));
              syftByE[e].forEach(si=>{
                if(si.matched_deal_id){autoMatches[si.id]=si.matched_deal_id;available.delete(si.matched_deal_id);return}
                let best=null,bestScore=0;
                for(const d of dealsByE[e]){
                  if(!available.has(d.id))continue;
                  const sc=matchScore(si,d);
                  if(sc>bestScore){bestScore=sc;best=d}
                }
                if(best&&bestScore>=40){autoMatches[si.id]=best.id;available.delete(best.id)}
              });
            });

            // Classify
            const matched=[],inSyftOnly=[],inHSOnly={};
            EIDs.forEach(e=>{
              const matchedDealIds=new Set();
              syftByE[e].forEach(si=>{
                const dealId=autoMatches[si.id];
                if(dealId){const deal=dealsByE[e].find(d=>d.id===dealId);if(deal){matched.push({syft:si,deal,entity:e});matchedDealIds.add(dealId)}
                } else {inSyftOnly.push({syft:si,entity:e})}
              });
              dealsByE[e].filter(d=>!matchedDealIds.has(d.id)).forEach(d=>{
                if(!inHSOnly[e])inHSOnly[e]=[];inHSOnly[e].push(d);
              });
            });

            // Totals per entity
            const syftTotalByE={},hsTotalByE={},matchedTotalByE={},gapByE={};
            EIDs.forEach(e=>{
              syftTotalByE[e]=syftByE[e].reduce((s,i)=>s+(i.outstanding||0),0);
              hsTotalByE[e]=dealsByE[e].reduce((s,d)=>s+(d.outstanding||0),0);
              matchedTotalByE[e]=matched.filter(m=>m.entity===e).reduce((s,m)=>s+(m.syft.outstanding||0),0);
              gapByE[e]=(syftRecon[e]?.ar_total||0)-hsTotalByE[e];
            });

            const fc=fmtC; // shorthand

            return h("div",null,
              // KPI summary
              h("div",{className:"grid-4",style:{marginBottom:16}},
                [{l:"Syft AR Total",v:fmtF(Math.round(EIDs.reduce((s,e)=>s+(syftRecon[e]?.ar_total||0)*(entMap[e]?.fx_rate||1),0))),s:"Accounting system",c:C.steel},
                 {l:"HubSpot AR Total",v:fmtF(Math.round(unpaid.reduce((s,d)=>s+toUSD(d),0))),s:unpaid.length+" deals",c:C.blue},
                 {l:"Gap (Syft \u2212 HS)",v:fmtF(Math.round(EIDs.reduce((s,e)=>s+gapByE[e]*(entMap[e]?.fx_rate||1),0))),s:"Not in HubSpot",c:C.warn},
                 {l:"Syft Items Loaded",v:syftAr.length+"",s:matched.length+" matched, "+inSyftOnly.length+" unmatched",c:syftAr.length?C.ok:C.mid}
                ].map((k,i)=>h("div",{key:i,className:"card kpi",style:{"--c":k.c}},h("div",{className:"kpi-label"},k.l),h("div",{className:"kpi-val"},k.v),h("div",{className:"kpi-sub"},k.s)))),

              // Per-entity gap
              h("div",{className:"card",style:{marginBottom:16}},
                h("div",{className:"card-hdr"},"AR Reconciliation by Entity"),
                h("table",null,
                  h("thead",null,h("tr",null,["Entity","Syft AR Total","HubSpot AR","Syft Items Loaded","Matched","Unmatched","Gap"].map(x=>h("th",{key:x,style:{textAlign:"right",padding:"6px 10px"}},x)))),
                  h("tbody",null,EIDs.map(e=>h("tr",{key:e},
                    h("td",{style:{fontWeight:600,color:C.ent[e],padding:"6px 10px"}},e),
                    h("td",{style:{textAlign:"right",padding:"6px 10px"}},fc(syftRecon[e]?.ar_total||0,e)),
                    h("td",{style:{textAlign:"right",padding:"6px 10px"}},fc(hsTotalByE[e],e)),
                    h("td",{style:{textAlign:"right",padding:"6px 10px"}},syftByE[e].length||"\u2014"),
                    h("td",{style:{textAlign:"right",padding:"6px 10px",color:C.ok}},matched.filter(m=>m.entity===e).length||"\u2014"),
                    h("td",{style:{textAlign:"right",padding:"6px 10px",color:C.warn}},inSyftOnly.filter(m=>m.entity===e).length||"\u2014"),
                    h("td",{style:{textAlign:"right",padding:"6px 10px",fontWeight:600,color:gapByE[e]>0?C.warn:C.ok}},fc(Math.round(gapByE[e]),e))
                  )))
                )
              ),

              // Upload CSV from Syft
              h("div",{className:"card",style:{marginBottom:16}},
                h("div",{className:"card-hdr"},h("span",null,"Upload Syft AR Report"),

                    h("td",null,h("span",{className:"badge "+(d.status||"current")},d.status)))}))))})(),
          // AP table with notes
          eAP.length>0&&h("div",{className:"card section"},h("div",{className:"card-hdr",style:{color:C.bad,background:"#FDE8E8"}},h("span",null,"Accounts Payable"),h("span",null,fc(eAP.reduce((s,d)=>s+d.amount,0)))),
            h("table",null,h("thead",null,h("tr",null,["Vendor","Amount","Due Date","Status","Notes","Updated",""].map(x=>h("th",{key:x},x)))),
              h("tbody",null,eAP.map(d=>h("tr",{key:d.id},
                h("td",{style:{fontWeight:500}},d.vendor_name),
                h("td",{style:{fontWeight:600,color:C.bad}},fc(d.amount)),
                h("td",{style:{fontSize:10}},d.due_date?dateFmt(d.due_date):"—"),
                h("td",null,h("select",{value:d.ap_status||"pending",style:{fontSize:10,padding:"2px 4px",border:"1px solid #E0DFDB",borderRadius:3,background:d.ap_status==="hold"?"#FEF3D6":d.ap_status==="paid"?"#E2F5EC":d.ap_status==="investigating"?"#EDF2FE":"#fff"},
                  onChange:ev=>{fetch("/api/ap/"+d.id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({ap_status:ev.target.value})}).then(()=>{const nd=[...ap];const idx=nd.findIndex(x=>x.id===d.id);if(idx>=0)nd[idx]={...nd[idx],ap_status:ev.target.value};setAp(nd)})}},
                  ["pending","hold","investigating","approved","paid"].map(o=>h("option",{key:o,value:o},o)))),
                h("td",null,h("input",{type:"text",defaultValue:d.notes||"",placeholder:"Add note for team...",style:{fontSize:10,minWidth:180,border:"1px solid #E8E7E3",borderRadius:4,padding:"3px 6px",background:d.notes?"#FFFDE7":"#FAFAF8"},
                  onBlur:ev=>{if(ev.target.value!==(d.notes||"")){fetch("/api/ap/"+d.id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({notes:ev.target.value,notes_updated_by:"Nik"})}).then(()=>{const nd=[...ap];const idx=nd.findIndex(x=>x.id===d.id);if(idx>=0)nd[idx]={...nd[idx],notes:ev.target.value,notes_updated_at:new Date().toISOString()};setAp(nd)})}}})),
                h("td",{style:{fontSize:9,color:C.warm,maxWidth:80}},d.notes_updated_at?dateFmt(d.notes_updated_at.slice(0,10))+(d.notes_updated_by?" · "+d.notes_updated_by:""):""),
                h("td",null,d.notes?h("span",{style:{fontSize:9,color:C.warn}},"\ud83d\udcac"):"")
              )))))
        )})(),

      // ═══ STOCK PAYMENTS ═══
      tab==="stock"&&h("div",null,
        h("div",{className:"card section"},
          h("div",{className:"card-hdr"},h("span",null,"Stock PO Payments \u2014 Bureau Ops"),
            h("a",{href:"https://bureau-ops.withbureau.com",target:"_blank",className:"btn btn-sm btn-outline",style:{textDecoration:"none"}},"Open Bureau Ops \u2197")),
          h("table",null,
            h("thead",null,h("tr",null,["Entity","PO","Supplier","Deposit","Dep Due","Release","Rel Due","Total","Status"].map(x=>h("th",{key:x},x)))),
            h("tbody",null,stockPOs.map(po=>h("tr",{key:po.id},
              h("td",null,h("span",{style:{color:C.ent[po.entity_id],fontWeight:600}},po.entity_id)),
              h("td",{style:{fontWeight:600,color:C.warn}},po.po_ref),
              h("td",{style:{color:C.mid}},po.supplier),
              h("td",null,fmtF(po.deposit_amount)),
              h("td",{style:{fontSize:10}},dateFmt(po.deposit_due)),
              h("td",null,fmtF(po.release_amount)),
              h("td",{style:{fontSize:10}},dateFmt(po.release_due)),
              h("td",{style:{fontWeight:600}},fmtF((po.deposit_amount||0)+(po.release_amount||0))),
              h("td",null,h("span",{className:"badge current"},"pending"))
            ))))
        ),
        // Trade finance — editable with add/delete/CSV
        h("div",{className:"card section"},
          h("div",{className:"card-hdr",style:{color:C.bad,background:"#FDE8E8"}},
            h("span",null,"Trade Finance Maturities \u2014 AU",h("span",{style:{fontSize:10,color:C.mid,marginLeft:8}},tradeLoans.length+" loans")),
            h("div",{style:{display:"flex",gap:6,alignItems:"center"}},
              h("label",{style:{fontSize:10,padding:"4px 10px",border:"1px solid #E0DFDB",borderRadius:4,cursor:"pointer",background:"#FAFAF8",color:C.steel}},
                "Upload CSV",
                h("input",{type:"file",accept:".csv",style:{display:"none"},onChange:ev=>{
                  const file=ev.target.files[0];if(!file)return;const reader=new FileReader();
                  reader.onload=e=>{const text=e.target.result,lines=text.split("\n").filter(l=>l.trim());
                    if(lines.length<2)return;
                    // RFC 4180 CSV parser: handles quoted fields with commas inside
                    const parseCSV=line=>{const res=[];let cur='',inQ=false;
                      for(let i=0;i<line.length;i++){const c=line[i];
                        if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++}else{inQ=!inQ}}
                        else if(c===','&&!inQ){res.push(cur.trim());cur=''}
                        else{cur+=c}}
                      res.push(cur.trim());return res};
                    // Auto-detect header row: find first line with 2+ column keywords (not just a title row)
                    const hdrKeys=['outstanding','interest','maturity','expiry','reference','product','counterparty','rate','bank'];
                    let hdrIdx=0;
                    for(let i=0;i<Math.min(lines.length,10);i++){
                      const low=lines[i].toLowerCase();
                      const hits=hdrKeys.filter(k=>low.includes(k)).length;
                      if(hits>=2){hdrIdx=i;break}}
                    const hdr=parseCSV(lines[hdrIdx]).map(h=>h.toLowerCase().replace(/[^a-z]/g,''));
                    // Parse number: strip commas, $, %, whitespace
                    const pn=s=>{if(!s)return 0;return parseFloat(s.replace(/[$,%\s]/g,'').replace(/,/g,''))||0};
                    const find=(row,...keys)=>{for(const k of keys){const idx=hdr.findIndex(h=>h.includes(k));if(idx>=0&&row[idx]?.trim())return row[idx].trim()}return ''};
                    const rows=lines.slice(hdrIdx+1).map(l=>parseCSV(l));
                    const loans=rows.filter(r=>pn(find(r,'outstandingtrade','outstanding','audequivalent'))>0).map(r=>({
                      entity_id:'AU',
                      reference:find(r,'bankreference','reference'),
                      po_ref:find(r,'customerreference','counterparty'),
                      outstanding:pn(find(r,'outstandingtrade','outstanding','audequivalent')),
                      maturity_date:find(r,'expirymat','maturitydate','expiry'),
                      rate:pn(find(r,'interestrate','rate'))
                    }));
                    if(!loans.length){alert('No valid rows found in CSV ('+lines.length+' lines, header at row '+(hdrIdx+1)+': '+hdr.slice(0,5).join(', ')+')');return}
                    // Normalize: rate as decimal if >1 (e.g. 5.88 -> 0.0588), dates dd/mm/yyyy -> yyyy-mm-dd
                    loans.forEach(l=>{
                      if(l.rate>1) l.rate=l.rate/100;
                      const md=l.maturity_date;
                      if(md&&md.includes('/')){const p=md.split('/');
                        if(p.length===3) l.maturity_date=p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0')}
                      else if(md&&md.includes('-')&&md.match(/^\d{1,2}-/)){
                        // Handle d-Mon-yyyy or dd-mm-yyyy
                        const parts=md.split('-');
                        if(parts.length===3){const mon={'jan':'01','feb':'02','mar':'03','apr':'04','may':'05','jun':'06','jul':'07','aug':'08','sep':'09','oct':'10','nov':'11','dec':'12'};
                          const m=mon[parts[1].toLowerCase().slice(0,3)];
                          if(m) l.maturity_date=parts[2]+'-'+m+'-'+parts[0].padStart(2,'0')}}
                      l.settlement=Math.round(l.outstanding*(1+l.rate/2))});
                    setSaving(true);
                    fetch('/api/inputs/trade-loans',{method:'PUT',headers:{'Content-Type':'application/json'},
                      body:JSON.stringify({replace_all:true,loans})})
                      .then(()=>fetch('/api/trade-loans').then(r=>r.json()))
                      .then(d=>{setTradeLoans(d.loans||[]);setSaving(false)})
                      .catch(()=>setSaving(false))};
                  reader.readAsText(file);ev.target.value=''}})),
              h("button",{style:{fontSize:10,padding:"4px 10px",border:"1px solid #E0DFDB",borderRadius:4,cursor:"pointer",background:"#E2F5EC",color:C.ok},
                onClick:()=>{
                  fetch('/api/trade-loans',{method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({entity_id:'AU',reference:'',po_ref:'',outstanding:0,settlement:0,maturity_date:'',rate:0.0588})})
                    .then(r=>r.json()).then(()=>fetch('/api/trade-loans').then(r=>r.json()))
                    .then(d=>setTradeLoans(d.loans||[]))}},"+ Add Row"))),
          h("div",{style:{fontSize:9,color:C.mid,padding:"4px 12px"}},"Settlement = Outstanding \u00d7 (1 + Rate/2). Edit any cell \u2014 saves on blur. Upload CSV to replace all rows."),
          h("table",null,
            h("thead",null,h("tr",null,["Reference","PO/Customer Ref","Outstanding (A$)","Rate %","Settlement (A$)","Maturity",""].map(x=>h("th",{key:x,style:{fontSize:10}},x)))),
            h("tbody",null,tradeLoans.map(l=>{
              const calcSettlement=(out,rate)=>Math.round(out*(1+(rate||0)/2));
              const saveRow=(field,val)=>{
                const upd={...l,[field]:val};
                if(field==='outstanding'||field==='rate') upd.settlement=calcSettlement(field==='outstanding'?val:l.outstanding,field==='rate'?val:l.rate);
                fetch('/api/trade-loans/'+l.id,{method:'PUT',headers:{'Content-Type':'application/json'},
                  body:JSON.stringify(upd)})
                  .then(()=>fetch('/api/trade-loans').then(r=>r.json()))
                  .then(d=>setTradeLoans(d.loans||[]))};
              return h("tr",{key:l.id},
                h("td",null,h("input",{type:"text",defaultValue:l.reference||'',style:{fontSize:10,width:120,padding:"3px 6px",border:"1px solid #E0DFDB",borderRadius:3},
                  onBlur:e=>saveRow('reference',e.target.value)})),
                h("td",null,h("input",{type:"text",defaultValue:l.po_ref||'',style:{fontSize:10,width:100,padding:"3px 6px",border:"1px solid #E0DFDB",borderRadius:3},
                  onBlur:e=>saveRow('po_ref',e.target.value)})),
                h("td",null,h("input",{type:"number",defaultValue:l.outstanding||0,style:{fontSize:11,fontWeight:600,width:100,padding:"3px 6px",border:"1px solid #E0DFDB",borderRadius:3,textAlign:"right"},
                  onBlur:e=>saveRow('outstanding',parseFloat(e.target.value)||0)})),
                h("td",null,h("input",{type:"number",defaultValue:l.rate?+(l.rate*100).toFixed(2):0,step:0.01,style:{fontSize:11,width:60,padding:"3px 6px",border:"1px solid #E0DFDB",borderRadius:3,textAlign:"center"},
                  onBlur:e=>saveRow('rate',parseFloat(e.target.value)/100||0)})),
                h("td",{style:{fontWeight:600,color:C.bad,fontSize:11}},fmtC(calcSettlement(l.outstanding,l.rate),'AU')),
                h("td",null,h("input",{type:"date",defaultValue:l.maturity_date||'',style:{fontSize:10,padding:"3px 6px",border:"1px solid #E0DFDB",borderRadius:3},
                  onBlur:e=>saveRow('maturity_date',e.target.value)})),
                h("td",{style:{textAlign:"center"}},h("button",{style:{fontSize:10,color:C.bad,background:"none",border:"none",cursor:"pointer",padding:"2px 6px"},
                  onClick:()=>{if(confirm('Delete this loan?'))fetch('/api/trade-loans/'+l.id,{method:'DELETE'})
                    .then(()=>fetch('/api/trade-loans').then(r=>r.json()))
                    .then(d=>setTradeLoans(d.loans||[]))}},"\u2715"))
              )})),
            h("tfoot",null,h("tr",{style:{borderTop:"2px solid "+C.steel,background:"#F5F4F0"}},
              h("td",{colSpan:2,style:{fontWeight:700,fontSize:10}},"Total"),
              h("td",{style:{fontWeight:700,textAlign:"right",fontSize:11}},fmtC(tradeLoans.reduce((s,l)=>s+(l.outstanding||0),0),'AU')),
              h("td",null),
              h("td",{style:{fontWeight:700,color:C.bad,fontSize:11}},fmtC(tradeLoans.reduce((s,l)=>s+Math.round((l.outstanding||0)*(1+(l.rate||0)/2)),0),'AU')),
              h("td",{colSpan:2}))))
        )
      ),

      // ═══ INPUTS ═══
      tab==="inputs"&&inputs&&h("div",null,
        h("div",{style:{marginBottom:16}},
          h("div",{style:{fontSize:16,fontWeight:700,marginBottom:4}},"Input Assumptions"),
          h("div",{style:{fontSize:11,color:C.mid}},"Edit any value below. Changes are saved to the database and immediately reflected in the waterfall calculation. All amounts in local currency.")),
        // Bank accounts - editable
        h("div",{className:"card section"},
          h("div",{className:"card-hdr"},h("span",null,"Bank Accounts & Amex Balances"),h("span",{style:{fontSize:10,color:C.mid}},"Edit any balance \u2014 saves on blur, waterfall recalculates")),
          h("div",{className:"grid-4",style:{padding:12}},
            (entities||[]).map(e=>{
              const cashAccts=(e.bank_accounts||[]).filter(b=>b.type!=='credit');
              const creditAccts=(e.bank_accounts||[]).filter(b=>b.type==='credit');
              const renderAcct=ba=>h("div",{key:ba.id,style:{marginBottom:8}},
                h("div",{style:{fontSize:9,color:C.mid,marginBottom:2}},ba.name),
                h("div",{style:{display:"flex",alignItems:"center",gap:4}},
                  h("span",{style:{fontSize:11,color:C.mid}},(CURR[e.id]||{s:'$'}).s),
                  h("input",{type:"number",defaultValue:ba.balance||0,style:{fontSize:13,fontWeight:600,padding:"4px 8px",border:"1px solid #E0DFDB",borderRadius:4,background:"#fff",width:"100%",fontFamily:"DM Sans"},
                    onBlur:ev=>{const newVal=parseFloat(ev.target.value)||0;if(newVal!==ba.balance){
                      setSaving(true);
                      fetch("/api/banks/"+ba.id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({balance:newVal})})
                      .then(()=>Promise.all([fetch('/api/entities').then(r=>r.json()),fetch('/api/waterfall?scenarios=1,2').then(r=>r.json())]))
                      .then(([ent,wf])=>{setEntities(ent.entities||[]);setWaterfall(wf);setSaving(false)})
                      .catch(()=>setSaving(false))}}})
                ));
              return h("div",{key:e.id,style:{padding:12,borderRadius:6,border:"1px solid #E8E7E3",borderTop:"3px solid "+C.ent[e.id],background:C.entBg[e.id]}},
                h("div",{style:{fontSize:12,fontWeight:700,color:C.ent[e.id],marginBottom:10}},e.id+" \u00b7 "+e.currency),
                cashAccts.length>0&&h("div",{style:{marginBottom:creditAccts.length?10:0}},
                  h("div",{style:{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:C.steel,marginBottom:6,paddingBottom:4,borderBottom:"1px solid #E0DFDB"}},"Cash Accounts"),
                  cashAccts.map(renderAcct)),
                creditAccts.length>0&&h("div",null,
                  h("div",{style:{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:C.bad,marginBottom:6,paddingBottom:4,borderBottom:"2px solid #FDE8E8",display:"flex",alignItems:"center",gap:6}},"Amex / Credit Cards",h("span",{style:{fontSize:8,padding:"1px 5px",borderRadius:3,background:"#FDE8E8",color:C.bad,fontWeight:600}},"PAYOFF")),
                  creditAccts.map(renderAcct))
              )})
          )),
        // Payroll & Marketing
        h(PayrollTable,{config:inputs.entity_config,settings:inputs.settings,
          onSave:d=>saveInput('entity-config',{entities:d}),
          onSaveSettings:s=>{fetch('/api/settings',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(s)}).then(()=>load())}}),
        // New orders
        h(NewOrdersTable,{orders:inputs.new_orders,onSave:d=>saveInput('new-orders',{entities:d})}),
        // AR collection
        h(ARCollectionPanel,{arRates:inputs.ar_collection,arHubspotOverflow:inputs.ar_hubspot_overflow||[],arDeals:ar,
          syftRecon:waterfall?Object.fromEntries(Object.entries(waterfall.entities||{}).map(([k,v])=>([k,{ar_total:v.arTotal,ap_total:v.apTotal}]))):null,
          entities:entities,settings:inputs.settings,
          onUpdateRate:(eId,wk,rate)=>saveInput('ar-collection',{rates:[{entity_id:eId,week_num:wk,rate}]}),
          onUpdateOverflow:(eId,wk,pct)=>{fetch('/api/inputs/ar-hubspot-overflow',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({rates:[{entity_id:eId,week_num:wk,overflow_pct:pct}]})}).then(()=>load())},
          onSaveSettings:s=>{fetch('/api/settings',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(s)}).then(()=>load())}}),
        // AP spread
        h(APSpreadGrid,{rates:inputs.ap_spread,entities:["US","CA","UK","AU"],
          apTotals:waterfall?Object.fromEntries(Object.entries(waterfall.entities||{}).map(([k,v])=>([k,v.apTotal]))):null,
          onUpdate:(eId,wk,rate)=>saveInput('ap-spread',{rates:[{entity_id:eId,week_num:wk,rate}]})}),
        // Amex payoff
        h(AmexTable,{amex:inputs.amex_payoff,onSave:d=>saveInput('amex-payoff',{entities:d})}),
        // Scheduled payments
        h(ScheduledTable,{payments:inputs.scheduled_payments,onSave:d=>{
          setSaving(true);
          fetch('/api/inputs/scheduled-payments',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({replace_all:true,payments:d.map(p=>({...p,id:undefined}))})})
          .then(()=>Promise.all([fetch('/api/inputs').then(r=>r.json()),fetch('/api/waterfall?scenarios=1,2').then(r=>r.json())]))
          .then(([inp,wf])=>{setInputs(inp);setWaterfall(wf);setSaving(false)}).catch(()=>setSaving(false))}}),
      ),

      // ═══ SCENARIOS ═══
      tab==="scenarios"&&h("div",null,
        h("div",{style:{fontSize:16,fontWeight:700,marginBottom:4}},"Scenario Modelling"),
        h("div",{style:{fontSize:11,color:C.mid,marginBottom:16}},"Create scenarios to model different cash outcomes. Active scenarios appear as additional lines on the Overview chart."),
        h("div",{className:"grid-2"},
          scenarios.map(s=>h("div",{key:s.id,className:"card",style:{padding:16,borderLeft:"4px solid "+(s.color||C.blue)}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
              h("div",{style:{fontSize:14,fontWeight:700}},s.name),
              h("span",{className:"badge "+(s.is_active?"paid":"current")},s.is_active?"Active":"Inactive")),
            h("div",{style:{fontSize:11,color:C.mid,marginBottom:8}},s.description),
            s.overrides&&h("div",null,
              Object.entries(s.overrides).map(([k,v])=>h("div",{key:k,style:{fontSize:10,display:"flex",justifyContent:"space-between",padding:"2px 0",borderBottom:"1px solid #F0EFEB"}},
                h("span",{style:{color:C.mid}},k.replace(/_/g," ")),
                h("span",{style:{fontWeight:600}},v)))
            )
          ))
        )
      ),
    ),

    // Footer
    h("div",{style:{borderTop:"1px solid #E8E7E3",padding:"8px 24px",display:"flex",justifyContent:"space-between",fontSize:9,color:C.warm,background:"#fff",marginTop:16}},
      h("span",null,"Bureau CFO Dashboard \u00b7 Live Calculation Engine"),
      h("span",null,"HubSpot + Syft + Bureau Ops"))
  );
}
ReactDOM.render(h(App),document.getElementById('root'));
</script>
</body>
